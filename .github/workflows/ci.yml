name: chronos-ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      confirm_overwrite:
        description: 'Type YES to override the drift gate (force-publish even if registry version >= package.json version). Use only for rollback scenarios.'
        required: false
        default: 'no'

permissions:
  contents: read

concurrency:
  # Differentiated by event_name so a workflow_dispatch publish run is not
  # cancelled by a subsequent push to main mid-flight.
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  # 5-platform NAPI matrix (Story 52.1). chronos's `package.json` declares
  # `@c9up/atlas: workspace:*` in devDependencies (used only by
  # `tests/integration/chronos-atlas-smoke.test.ts`). A standalone
  # `pnpm install` in chronos's submodule repo crashes on the workspace
  # protocol because there's no parent workspace and `@c9up/*` aren't on
  # npm yet. Mitigation (mirrors warden 40.4 cross-package smoke gate):
  # synthesize a minimal pnpm workspace stub on the runner with chronos +
  # atlas as workspace members so the protocol resolves. The matrix vitest
  # runs `--run tests/unit` (excludes the integration smoke test that
  # imports atlas at runtime) so the matrix proves the NAPI binary works
  # cross-platform without needing atlas's NAPI also built per-platform.
  build-and-test:
    name: Build & test (${{ matrix.suffix }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,    suffix: linux-x64-gnu }
          - { os: ubuntu-24.04-arm, suffix: linux-arm64-gnu }
          - { os: macos-13,         suffix: darwin-x64 }
          - { os: macos-14,         suffix: darwin-arm64 }
          - { os: windows-latest,   suffix: win32-x64-msvc }
    defaults:
      run:
        working-directory: ws
    steps:
      - name: Checkout chronos into workspace stub
        uses: actions/checkout@v4
        with:
          path: ws/packages/chronos

      # Sibling clone of atlas's standalone repo. If atlas is private,
      # provision a PAT scoped to C9up/atlas read access.
      - name: Checkout atlas into workspace stub
        uses: actions/checkout@v4
        with:
          repository: C9up/atlas
          path: ws/packages/atlas
          ref: main

      # Synthesize a pnpm-workspace.yaml so `workspace:*` resolves locally.
      - name: Synthesize workspace root
        shell: bash
        run: |
          cat > pnpm-workspace.yaml <<'EOF'
          packages:
            - "packages/*"
          EOF
          cat > package.json <<'EOF'
          { "name": "ream-dev-ci-stub", "private": true }
          EOF

      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install

      - name: Build NAPI binary
        run: pnpm --filter @c9up/chronos build:napi

      - name: Vitest (unit only — integration imports atlas at runtime)
        run: pnpm --filter @c9up/chronos test --run tests/unit --reporter=json --outputFile=test-results.json
        shell: bash

      - name: Smoke gate — tests ran AND zero skipped (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          if [ ! -f packages/chronos/test-results.json ]; then
            echo "::error::test-results.json not produced — pnpm test failed before writing"
            exit 1
          fi
          total=$(jq '[.testResults[].assertionResults[]] | length' packages/chronos/test-results.json)
          if [ "$total" -eq 0 ]; then
            echo "::error::0 tests ran — test discovery is broken (check vitest include glob)"
            exit 1
          fi
          skipped=$(jq '[.testResults[].assertionResults[] | select(.status=="skipped")] | length' packages/chronos/test-results.json)
          if [ "$skipped" -ne 0 ]; then
            echo "::error::$skipped tests skipped — check NAPI binary load path"
            exit 1
          fi
        shell: bash

      - name: Smoke gate — tests ran AND zero skipped (Windows)
        if: runner.os == 'Windows'
        run: |
          $path = "packages/chronos/test-results.json"
          if (-not (Test-Path $path)) {
            Write-Error "test-results.json not produced — pnpm test failed before writing"
            exit 1
          }
          $total = python -c "import json,sys; d=json.load(open(sys.argv[1])); print(sum(1 for r in d['testResults'] for a in r['assertionResults']))" $path
          if ([int]$total -eq 0) {
            Write-Error "0 tests ran — test discovery is broken (check vitest include glob)"
            exit 1
          }
          $skipped = python -c "import json,sys; d=json.load(open(sys.argv[1])); print(sum(1 for r in d['testResults'] for a in r['assertionResults'] if a['status']=='skipped'))" $path
          if ([int]$skipped -ne 0) {
            Write-Error "$skipped tests skipped — check NAPI binary load path"
            exit 1
          }
        shell: pwsh

      - name: Upload artefact
        uses: actions/upload-artifact@v4
        with:
          name: chronos-napi-${{ matrix.suffix }}
          path: ws/packages/chronos/index.${{ matrix.suffix }}.node
          if-no-files-found: error

  cargo-tests:
    name: Cargo tests (linux-x64-gnu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --workspace

  # Publish job — gated on workflow_dispatch (manual maintainer trigger).
  # Requires NPM_TOKEN secret + a v<MAJOR>.<MINOR>.<PATCH> tag at HEAD matching
  # package.json. Drift gate refuses to overwrite a published version (or roll
  # back to an older one) without `confirm_overwrite=YES`.
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [build-and-test, cargo-tests]
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      - name: Verify NPM_TOKEN secret
        run: |
          if [ -z "${{ secrets.NPM_TOKEN }}" ]; then
            echo "::error::NPM_TOKEN secret missing — set in repo settings before manual publish"
            exit 1
          fi

      - name: Tag-vs-package.json gate
        run: |
          tag=$(git tag --points-at HEAD --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -1)
          if [ -z "$tag" ]; then
            echo "::error::HEAD has no v<MAJOR>.<MINOR>.<PATCH>-shaped tag — refuse to publish from an untagged commit"
            exit 1
          fi
          node_err=$(mktemp)
          if ! pkg_v=$(node -p "require('./package.json').version" 2>"$node_err"); then
            echo "::error::Failed to read package.json version: $(cat "$node_err")"
            rm -f "$node_err"; exit 1
          fi
          rm -f "$node_err"
          if [ -z "$pkg_v" ]; then
            echo "::error::package.json version field is empty"
            exit 1
          fi
          pkg_tag="v${pkg_v}"
          if [ "$tag" != "$pkg_tag" ]; then
            echo "::error::Tag $tag does not match package.json $pkg_tag — refuse to publish from a drifted tag"
            exit 1
          fi
          echo "Tag gate passed: $tag == $pkg_tag"

      - name: Drift fail-closed gate
        env:
          CONFIRM_OVERWRITE: ${{ inputs.confirm_overwrite }}
        run: |
          node_err=$(mktemp)
          if ! local_v=$(node -p "require('./package.json').version" 2>"$node_err"); then
            echo "::error::Failed to read package.json version: $(cat "$node_err")"
            rm -f "$node_err"; exit 1
          fi
          rm -f "$node_err"
          if [ -z "$local_v" ]; then
            echo "::error::package.json version field is empty"
            exit 1
          fi
          npm_err=$(mktemp)
          npm_v=$(npm view --fetch-timeout=30000 @c9up/chronos version 2>"$npm_err")
          status=$?
          err=$(cat "$npm_err"); rm -f "$npm_err"
          if [ "$status" -ne 0 ]; then
            if echo "$err" | grep -qE 'E404|404 Not Found'; then
              npm_v=""
              echo "Drift gate: package not yet on registry — first-publish path"
            else
              echo "::error::Cannot reach npm registry — refuse to publish without a verified registry version. Output: $err"
              exit 1
            fi
          fi
          if [ -z "$npm_v" ]; then
            echo "Drift gate passed: first publish of @c9up/chronos (local $local_v)"
            exit 0
          fi
          highest=$(printf '%s\n%s\n' "$npm_v" "$local_v" | sort -V | tail -1)
          if [ "$local_v" = "$npm_v" ]; then
            if [ "$CONFIRM_OVERWRITE" != "YES" ]; then
              echo "::error::Local version $local_v already published — bump package.json or re-run with confirm_overwrite=YES (rollback path)"
              exit 1
            fi
            echo "Override accepted: republishing $local_v over registry $npm_v"
          elif [ "$highest" = "$npm_v" ]; then
            if [ "$CONFIRM_OVERWRITE" != "YES" ]; then
              echo "::error::Registry version $npm_v is newer than local $local_v — refuse to roll back without confirm_overwrite=YES"
              exit 1
            fi
            echo "Override accepted: rolling back from $npm_v to $local_v"
          else
            echo "Drift gate passed: local $local_v > registry $npm_v"
          fi

      - run: pnpm install
      - uses: actions/download-artifact@v4
        with:
          pattern: chronos-napi-*
          merge-multiple: true
      - run: pnpm publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
